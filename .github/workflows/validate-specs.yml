name: Validate Specs

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-specs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Tuned Tensor CLI
        run: npm install -g @tuned-tensor/cli

      - name: Validate specs
        run: scripts/validate-specs.sh
